# Build the Astro static site and publish it to GitHub Pages.
#
# Setup (one time): in the repo, Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". Then push to the default branch and this workflow
# builds `dist/` and deploys it.
#
# `base`/`site` come from the env vars below (read by astro.config.mjs), so the
# site publishes under the project subpath jaredcosulich.github.io/harvardintech
# while local dev / the codeyam preview stay at '/'. When a custom domain
# (e.g. harvardintech.com) is configured, drop DEPLOY_BASE_PATH (so base → '/')
# and point PAGES_SITE at the domain.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        env:
          DEPLOY_BASE_PATH: /harvardintech
          PAGES_SITE: https://jaredcosulich.github.io
        # with:
        #   path: .            # root of the Astro project (default)
        #   node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
