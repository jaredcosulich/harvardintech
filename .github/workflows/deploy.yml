# Build the Astro static site and publish it to GitHub Pages.
#
# Setup (one time): in the repo, Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". Then push to the default branch and this workflow
# builds `dist/` and deploys it. Set `site`/`base` in `astro.config.mjs` to your
# Pages URL/repo path first so internal links resolve under the subpath.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        # with:
        #   path: .            # root of the Astro project (default)
        #   node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
